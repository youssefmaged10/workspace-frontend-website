<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProWorkspace – Sign In</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0"  y="0"  width="12" height="12" rx="2" fill="#1a56db"/>
        <rect x="16" y="0"  width="12" height="12" rx="2" fill="#1a56db" opacity="0.55"/>
        <rect x="0"  y="16" width="12" height="12" rx="2" fill="#1a56db" opacity="0.55"/>
        <rect x="16" y="16" width="12" height="12" rx="2" fill="#1a56db"/>
      </svg>
      <span class="logo-text">ProWorkspace</span>
    </div>

    <!-- Heading -->
    <h1 class="heading">Welcome back</h1>
    <p class="subheading">Enter your credentials to access your workspace.</p>

    <!-- Form -->
    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="field-group">
        <label for="email" class="label">EMAIL ADDRESS</label>
        <input
          type="email"
          id="email"
          name="email"
          class="input"
          placeholder="name@company.com"
          autocomplete="email"
        />
        <span class="error-msg" id="emailError"></span>
      </div>

      <!-- Password -->
      <div class="field-group">
        <div class="label-row">
          <label for="password" class="label">PASSWORD</label>
        </div>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            class="input"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
            <!-- Eye icon -->
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" id="passwordError"></span>
      </div>

      <!-- Remember -->
      <div class="remember-row">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" name="remember" />
          <span class="custom-checkbox"></span>
          <span class="remember-text">Remember this device</span>
        </label>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-signin" id="signInBtn">
        <span class="btn-text">Sign In</span> 
        <span class="btn-spinner" id="btnSpinner" hidden></span>
    <form action="dashboard.html" method="GET">
</form>
      </button>

    </form>
  </div>

  <script src="login.js"></script>
</body>
</html>
